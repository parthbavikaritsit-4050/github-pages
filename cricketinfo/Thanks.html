<!DOCTYPE html>
<html>
<head>
  <title>Thank You </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      text-align: center;
      padding: 50px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      display: inline-block;
    }

    h1 {
      color: #2c3e50;
    }

    p {
      font-size: 18px;
      color: #555;
    }

    .thank {
      color: green;
      font-weight: bold;
      font-size: 22px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🌸 Thank You Ma'am 🌸</h1>
  
  <p class="thank">We are grateful for your guidance and support.</p>
  
  <p>
    Thank you for teaching us with patience and care.<br>
    Your efforts help us grow and learn every day.
  </p>

  <p>
    You are not just a teacher, but also a mentor and inspiration.
  </p>

  <h3>🙏 Thank You for Everything 🙏</h3>
</div>

</body>
</html>
